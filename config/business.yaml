# Business profile for the AI reception agent.
# Edit this file to adapt the agent to any small business.

name: "Lumière Nail Studio"
timezone: "Europe/Lisbon"
phone: "+351 912 000 000"
address: "Rua das Flores 12, Braga"

services:
  - name: "Gel manicure"
    duration_minutes: 45
    price: "25 EUR"
  - name: "Classic manicure"
    duration_minutes: 30
    price: "18 EUR"
  - name: "Pedicure"
    duration_minutes: 60
    price: "30 EUR"
  - name: "Nail art (per nail)"
    duration_minutes: 15
    price: "4 EUR"

# Opening hours per weekday. Use 24h HH:MM. Omit a day to mark it closed.
opening_hours:
  monday: { open: "09:00", close: "19:00" }
  tuesday: { open: "09:00", close: "19:00" }
  wednesday: { open: "09:00", close: "19:00" }
  thursday: { open: "09:00", close: "19:00" }
  friday: { open: "09:00", close: "19:00" }
  saturday: { open: "09:00", close: "14:00" }
  # sunday omitted: closed

booking_rules:
  slot_minutes: 45        # length of each proposed slot
  lead_time_hours: 2      # earliest a customer can book from now
  horizon_days: 7         # how far ahead to look for free slots
  max_suggestions: 3      # number of slots to propose

faqs:
  - q: "Do you take walk ins?"
    a: "We recommend booking in advance, but we accept walk ins when there is space."
  - q: "What payment methods do you accept?"
    a: "We accept cash, MB Way, and all major cards."
  - q: "Do you have parking?"
    a: "There is paid street parking on Rua das Flores and a public car park two minutes away."
